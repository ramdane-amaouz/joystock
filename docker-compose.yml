services:
  backend:
    build: ./backend
    container_name: joystock-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: joystock-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped